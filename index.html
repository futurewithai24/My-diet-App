<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ダイエット管理アプリ</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ===== Reset & Variables ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:       #06C755;
      --green-dark:  #05a847;
      --green-light: #edfbf3;
      --blue:        #007bff;
      --red:         #e74c3c;
      --yellow:      #f39c12;
      --g100: #f8f9fa;
      --g200: #f0f2f5;
      --g300: #e9ecef;
      --g400: #dee2e6;
      --g500: #adb5bd;
      --g600: #6c757d;
      --g700: #495057;
      --g800: #343a40;
      --white: #ffffff;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
      --shadow:    0 4px 12px rgba(0,0,0,0.10);
      --r-sm: 8px;
      --r:    12px;
      --r-lg: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--g200);
      color: var(--g800);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .app-header {
      background: var(--green);
      color: white;
      padding: 14px 16px 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .app-header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.4px; }
    .app-header .sub { font-size: 11px; opacity: 0.85; margin-top: 1px; }

    /* ===== Tab Navigation ===== */
    .tab-nav {
      background: var(--white);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--g300);
      position: sticky;
      top: 54px;
      z-index: 99;
    }
    .tab-item {
      padding: 11px 4px 9px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--g500);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }
    .tab-item .icon { font-size: 17px; display: block; margin-bottom: 2px; }
    .tab-item.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }

    /* ===== Pages ===== */
    .page { display: none; padding: 14px; max-width: 520px; margin: 0 auto; padding-bottom: 32px; }
    .page.active { display: block; }

    /* ===== Card ===== */
    .card {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--g600);
      margin-bottom: 12px;
      padding-left: 8px;
      border-left: 3px solid var(--green);
    }

    /* ===== Form ===== */
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--g600); margin-bottom: 5px; }
    .form-control {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--g300);
      border-radius: var(--r-sm);
      font-size: 14px;
      color: var(--g800);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(6,199,85,0.12);
    }

    /* ===== Record Type Selector ===== */
    .type-sel {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .type-btn {
      padding: 12px 6px;
      text-align: center;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 600;
      color: var(--g500);
      background: var(--g100);
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }
    .type-btn .t-icon { font-size: 20px; display: block; margin-bottom: 3px; }
    .type-btn.active {
      color: var(--green);
      background: var(--green-light);
      border-color: var(--green);
    }

    /* ===== Buttons ===== */
    .btn {
      display: block; width: 100%;
      padding: 13px; border: none;
      border-radius: var(--r);
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    .btn-primary { background: var(--green); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--green-dark); }
    .btn-primary:disabled { background: var(--g400); cursor: not-allowed; }
    .btn-secondary { background: var(--g700); color: white; font-size: 13px; padding: 10px; }
    .btn-outline {
      background: var(--white); color: var(--blue);
      border: 1.5px solid var(--blue); font-size: 13px; padding: 10px;
    }
    .btn-outline:disabled { color: var(--g500); border-color: var(--g400); cursor: not-allowed; }

    /* ===== Photo ===== */
    .photo-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .preview-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .preview-item { position: relative; width: calc(33.33% - 4px); }
    .preview-img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover; border-radius: var(--r-sm);
      border: 1.5px solid var(--g300);
    }
    .preview-del {
      position: absolute; top: -7px; right: -7px;
      width: 22px; height: 22px;
      background: var(--red); color: white;
      border-radius: 50%; font-size: 13px; font-weight: 700;
      line-height: 22px; text-align: center; cursor: pointer;
    }

    /* ===== Calorie Box ===== */
    .calorie-box {
      background: var(--g100);
      border: 1.5px solid var(--g300);
      border-radius: var(--r);
      padding: 12px;
      margin-top: 8px;
      font-size: 13px; line-height: 1.8;
      white-space: pre-wrap; color: var(--g700);
      min-height: 72px;
      transition: border-color 0.2s, background 0.2s;
    }
    .calorie-box.ok { border-color: var(--green); background: var(--green-light); }
    .source-links { margin-top: 6px; font-size: 11px; color: var(--g500); }
    .source-links a { color: var(--blue); text-decoration: none; }

    /* ===== Filter Bar ===== */
    .filter-bar {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ===== Monthly Stats ===== */
    .monthly-stats {
      background: var(--green-light);
      border: 1.5px solid #b2dfdb;
      border-radius: var(--r-lg);
      padding: 12px;
      margin-bottom: 12px;
    }
    .ms-title { font-size: 12px; font-weight: 700; color: var(--g600); margin-bottom: 8px; }
    .ms-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .ms-chip {
      background: var(--white); border-radius: var(--r-sm);
      padding: 8px 4px; text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .ms-val { font-size: 17px; font-weight: 800; color: var(--green); }
    .ms-lbl { font-size: 10px; color: var(--g500); margin-top: 1px; }

    /* ===== List ===== */
    .list-summary {
      font-size: 13px; font-weight: 700; color: var(--g600);
      text-align: center; padding: 8px 0;
      border-bottom: 2px solid var(--green);
      margin-bottom: 6px;
    }
    .list-card { background: var(--white); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
    .list-row {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--g200);
    }
    .list-row:last-child { border-bottom: none; }
    .list-main { flex: 1; min-width: 0; }
    .list-memo { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-meta { font-size: 11px; color: var(--g500); margin-top: 2px; }
    .list-photos { margin-top: 5px; display: flex; gap: 4px; flex-wrap: wrap; }
    .photo-a {
      font-size: 11px; color: var(--blue); text-decoration: none;
      background: var(--g100); border: 1px solid var(--g300);
      border-radius: 4px; padding: 2px 7px;
    }
    .list-right { text-align: right; flex-shrink: 0; }
    .rec-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      color: white; padding: 2px 7px; border-radius: 4px; margin-bottom: 4px;
    }
    .rec-badge.meal    { background: var(--green); }
    .rec-badge.workout { background: var(--blue); }
    .rec-badge.health  { background: var(--yellow); }
    .list-metric { font-size: 13px; font-weight: 700; color: var(--blue); }

    /* ===== KPI Grid ===== */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .kpi-card {
      background: var(--white); border-radius: var(--r-lg);
      padding: 14px; text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .kpi-val { font-size: 26px; font-weight: 800; line-height: 1.1; }
    .kpi-lbl { font-size: 11px; color: var(--g500); margin-top: 4px; }

    /* ===== Charts ===== */
    .chart-card {
      background: var(--white); border-radius: var(--r-lg);
      padding: 14px; box-shadow: var(--shadow-sm); margin-bottom: 12px;
    }
    .chart-title { font-size: 13px; font-weight: 700; color: var(--g600); margin-bottom: 12px; padding-left: 8px; border-left: 3px solid var(--green); }
    .chart-box { position: relative; width: 100%; }
    .doughnut-wrap { width: min(100%, 280px); margin: 0 auto; }

    /* ===== AI Result ===== */
    .ai-result {
      background: var(--g100); border: 1.5px solid var(--g300);
      border-radius: var(--r-lg); padding: 14px;
      margin-top: 12px; white-space: pre-wrap;
      line-height: 1.8; font-size: 13px; color: var(--g700);
      min-height: 120px; transition: border-color 0.2s, background 0.2s;
    }
    .ai-result.ok { border-color: var(--blue); background: #f0f7ff; }

    /* ===== Misc ===== */
    .empty { text-align: center; padding: 36px 20px; color: var(--g400); }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }
    .empty-text { font-size: 13px; }
    .hidden { display: none !important; }
    .mb-8  { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header class="app-header">
  <h1>🥗 ダイエット管理アプリ</h1>
  <div class="sub" id="headerUser">読み込み中...</div>
</header>

<!-- タブナビ -->
<nav class="tab-nav">
  <div class="tab-item active" onclick="showPage('input')">
    <span class="icon">✏️</span>記録
  </div>
  <div class="tab-item" onclick="showPage('list')">
    <span class="icon">📋</span>履歴
  </div>
  <div class="tab-item" onclick="showPage('summary')">
    <span class="icon">📊</span>サマリー
  </div>
  <div class="tab-item" onclick="showPage('advice')">
    <span class="icon">🤖</span>AI助言
  </div>
</nav>

<!-- ========== 記録タブ ========== -->
<div id="pageInput" class="page active">

  <div class="type-sel">
    <div id="typeMeal"    class="type-btn active" onclick="setType('食事')">
      <span class="t-icon">🍽️</span>食事
    </div>
    <div id="typeWorkout" class="type-btn"        onclick="setType('運動')">
      <span class="t-icon">💪</span>運動
    </div>
    <div id="typeHealth"  class="type-btn"        onclick="setType('体調')">
      <span class="t-icon">⚖️</span>体調
    </div>
  </div>

  <div class="card">
    <div class="form-group">
      <label class="form-label">分類</label>
      <select id="category" class="form-control"></select>
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <input type="text" id="memo" class="form-control" placeholder="例: 鶏胸肉サラダ / ジムで筋トレ30分">
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" id="date" class="form-control">
    </div>

    <!-- 食事フィールド -->
    <div id="mealFields">
      <div class="form-group">
        <label class="form-label">食事区分</label>
        <select id="mealTiming" class="form-control">
          <option value="朝">朝</option>
          <option value="昼">昼</option>
          <option value="夜">夜</option>
          <option value="間食">間食</option>
          <option value="プロテイン">プロテイン</option>
        </select>
      </div>
    </div>

    <!-- 運動フィールド -->
    <div id="workoutFields" class="hidden">
      <div class="form-group">
        <label class="form-label">運動種別</label>
        <input type="text" id="exerciseType" class="form-control" placeholder="例: ジム / 散歩 / ランニング">
      </div>
      <div class="form-group">
        <label class="form-label">運動時間（分）</label>
        <input type="number" id="exerciseMinutes" class="form-control" placeholder="例: 45" inputmode="numeric" min="0">
      </div>
    </div>

    <!-- 体調フィールド -->
    <div id="healthFields" class="hidden">
      <div class="form-group">
        <label class="form-label">体重（kg）</label>
        <input type="number" id="weight" class="form-control" placeholder="例: 58.4" step="0.1" inputmode="decimal">
      </div>
      <div class="form-group">
        <label class="form-label">体脂肪率（%）</label>
        <input type="number" id="bodyFat" class="form-control" placeholder="例: 24.1" step="0.1" inputmode="decimal">
      </div>
      <div class="form-group">
        <label class="form-label">お通じ</label>
        <select id="bowelMovement" class="form-control">
          <option value="">未選択</option>
          <option value="あり">あり</option>
          <option value="なし">なし</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 写真 & カロリー推定 -->
  <div class="card">
    <div class="card-title">写真（最大3枚）</div>
    <div class="photo-btns">
      <div class="btn btn-secondary" onclick="document.getElementById('cameraInput').click()">📷 カメラ起動</div>
      <div class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()">📁 写真選択</div>
    </div>
    <input type="file" id="cameraInput"  accept="image/*" capture="environment" class="hidden" onchange="handleFiles(this)">
    <input type="file" id="galleryInput" accept="image/*" multiple          class="hidden" onchange="handleFiles(this)">
    <div id="previewRow" class="preview-row"></div>

    <div id="calorieBtnArea">
      <button class="btn btn-outline mb-8" id="calorieBtn" onclick="estimateCalories()" type="button" disabled>
        📊 写真からカロリー推定
      </button>
      <div id="calorieResult" class="calorie-box">
食事写真を選択して「写真からカロリー推定」を押すと、推定カロリーとPFCを表示します。</div>
      <div id="calorieSources" class="source-links"></div>
    </div>
  </div>

  <button class="btn btn-primary" id="submitBtn" onclick="sendData()" disabled>認証中...</button>
</div>

<!-- ========== 履歴タブ ========== -->
<div id="pageList" class="page">
  <div class="filter-bar">
    <div class="filter-grid">
      <select id="filterUser"     class="form-control" onchange="applyFilters()"><option value="">全員</option></select>
      <select id="filterCategory" class="form-control" onchange="applyFilters()"><option value="">全記録</option></select>
      <select id="filterYear"     class="form-control" onchange="applyFilters()"><option value="">年</option></select>
      <select id="filterMonth"    class="form-control" onchange="applyFilters()"><option value="">月</option></select>
    </div>
  </div>

  <div id="monthlyStats" class="monthly-stats hidden">
    <div class="ms-title">当月サマリー</div>
    <div class="ms-row">
      <div class="ms-chip">
        <div class="ms-val" id="msWorkout">-</div>
        <div class="ms-lbl">運動回数</div>
      </div>
      <div class="ms-chip">
        <div class="ms-val" id="msWeight">-</div>
        <div class="ms-lbl">体重変化</div>
      </div>
      <div class="ms-chip">
        <div class="ms-val" id="msBowel">-</div>
        <div class="ms-lbl">お通じ率</div>
      </div>
    </div>
  </div>

  <div id="listSummary" class="list-summary hidden"></div>
  <div id="listWrap"></div>
</div>

<!-- ========== サマリータブ ========== -->
<div id="pageSummary" class="page">
  <div class="filter-bar">
    <div class="filter-grid">
      <select id="summaryUser"     class="form-control" onchange="applySummary()"><option value="">全員</option></select>
      <select id="summaryCategory" class="form-control" onchange="applySummary()"><option value="">全記録</option></select>
      <select id="summaryYear"     class="form-control" onchange="applySummary()"><option value="">年</option></select>
      <select id="summaryMonth"    class="form-control" onchange="applySummary()"><option value="">月</option></select>
    </div>
  </div>

  <div id="kpiGrid" class="kpi-grid hidden">
    <div class="kpi-card">
      <div class="kpi-val" id="kpiWeight" style="color:var(--green)">-</div>
      <div class="kpi-lbl">体重増減 (kg)</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val" id="kpiWorkout" style="color:var(--blue)">-</div>
      <div class="kpi-lbl">運動時間合計 (分)</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val" id="kpiBowel" style="color:var(--yellow)">-</div>
      <div class="kpi-lbl">お通じ「あり」回数</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val" id="kpiMeal" style="color:var(--red)">-</div>
      <div class="kpi-lbl">食事記録件数</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-title">体重推移（kg）</div>
    <div class="chart-box" style="height:200px;"><canvas id="weightChart"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">運動時間（分）vs 食事記録数</div>
    <div class="chart-box" style="height:200px;"><canvas id="barChart"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">記録種別の割合</div>
    <div class="doughnut-wrap" style="height:260px;"><canvas id="doughnutChart"></canvas></div>
  </div>
</div>

<!-- ========== AI助言タブ ========== -->
<div id="pageAdvice" class="page">
  <div class="filter-bar">
    <div class="filter-grid">
      <select id="adviceUser" class="form-control"><option value="">自分（ログインユーザー）</option></select>
      <select id="advicePeriod" class="form-control">
        <option value="7">直近7日</option>
        <option value="14">直近14日</option>
        <option value="30">直近30日</option>
      </select>
    </div>
  </div>
  <button class="btn btn-primary" id="aiBtn" onclick="runAI()" disabled>🤖 AI分析を実行する</button>
  <div id="aiResult" class="ai-result">分析結果がここに表示されます。</div>
</div>

<script>
  /* ===== 設定 ===== */
  const LIFF_ID = "2009863857-yW268YAg";
  const GAS_URL = "YOUR_GAS_DEPLOYMENT_URL"; // ← GASデプロイ後に差し替え

  /* ===== 状態 ===== */
  let recordType    = "食事";
  let imageBlobs    = [];
  let allData       = [];
  let currentUserId = "";
  let latestCalorie = null;
  let chartW = null, chartB = null, chartD = null;

  const CATEGORIES = {
    "食事": ["朝食", "昼食", "夕食", "間食", "プロテイン", "その他"],
    "運動": ["ジム", "散歩", "ランニング", "自宅トレ", "ストレッチ", "水泳", "その他"],
    "体調": ["体重測定", "お通じ", "睡眠", "体調メモ", "その他"]
  };

  /* ===== 起動 ===== */
  window.onload = async function () {
    date.value = new Date().toISOString().split("T")[0];
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const p = await liff.getProfile();
      currentUserId = p.userId;
      headerUser.textContent = p.displayName + " さん";
      await callGas("register", { userId: p.userId, displayName: p.displayName });
      submitBtn.disabled  = false;
      submitBtn.innerText = "記録を保存する";
      aiBtn.disabled      = false;
      calorieBtn.disabled = false;
      updateCategories();
      await initSelects();
    } catch (e) {
      headerUser.textContent = "LIFF初期化に失敗しました";
    }
  };

  async function callGas(action, data) {
    const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, data }) });
    return r.json();
  }

  /* ===== セレクト初期化 ===== */
  async function initSelects() {
    const res = await callGas("getUsers", {});
    const users = res.result || [];

    [filterUser, summaryUser, adviceUser].forEach(s => {
      s.innerHTML = s.id === "adviceUser"
        ? '<option value="">自分（ログインユーザー）</option>'
        : '<option value="">全員</option>';
      users.forEach(u => s.add(new Option(u.name, u.lineId)));
    });

    [filterYear, summaryYear].forEach(s => {
      s.innerHTML = '<option value="">年</option>';
      for (let y = 2025; y <= 2035; y++) s.add(new Option(y + "年", y));
    });
    [filterMonth, summaryMonth].forEach(s => {
      s.innerHTML = '<option value="">月</option>';
      for (let m = 1; m <= 12; m++) s.add(new Option(m + "月", m));
    });

    const cats = [...new Set(Object.values(CATEGORIES).flat())].sort();
    [filterCategory, summaryCategory].forEach(s => {
      s.innerHTML = '<option value="">全記録</option>';
      cats.forEach(c => s.add(new Option(c, c)));
    });
  }

  /* ===== タブ ===== */
  function showPage(p) {
    document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
    document.getElementById("page" + p[0].toUpperCase() + p.slice(1)).classList.add("active");
    document.querySelectorAll(".tab-item")[{ input: 0, list: 1, summary: 2, advice: 3 }[p]].classList.add("active");
    if (p !== "input") loadData(p);
  }

  async function loadData(mode) {
    const res = await callGas("getRecords", {});
    allData = res.result || [];
    if (mode === "list")    applyFilters();
    if (mode === "summary") applySummary();
  }

  /* ===== 記録種別 ===== */
  function setType(t) {
    recordType = t;
    typeMeal.classList.toggle("active",    t === "食事");
    typeWorkout.classList.toggle("active", t === "運動");
    typeHealth.classList.toggle("active",  t === "体調");
    mealFields.classList.toggle("hidden",    t !== "食事");
    workoutFields.classList.toggle("hidden", t !== "運動");
    healthFields.classList.toggle("hidden",  t !== "体調");
    calorieBtnArea.classList.toggle("hidden", t !== "食事");
    updateCategories();
  }

  function updateCategories() {
    category.innerHTML = "";
    CATEGORIES[recordType].forEach(c => category.add(new Option(c, c)));
  }

  /* ===== 写真 ===== */
  function handleFiles(input) {
    Array.from(input.files).forEach(f => {
      if (imageBlobs.length >= 3) return;
      const r = new FileReader();
      r.onload = e => { imageBlobs.push(e.target.result); renderPreviews(); };
      r.readAsDataURL(f);
    });
    input.value = "";
  }

  function renderPreviews() {
    previewRow.innerHTML = "";
    imageBlobs.forEach((b, i) => {
      const d = document.createElement("div");
      d.className = "preview-item";
      d.innerHTML = `<img src="${b}" class="preview-img">
        <div class="preview-del" onclick="delImg(${i})">×</div>`;
      previewRow.appendChild(d);
    });
  }
  function delImg(i) { imageBlobs.splice(i, 1); renderPreviews(); }

  /* ===== カロリー推定 ===== */
  async function estimateCalories() {
    if (!imageBlobs.length) return alert("先に食事写真を選択してください");
    calorieBtn.disabled = true;
    calorieBtn.innerText = "推定中...";
    calorieResult.className = "calorie-box";
    calorieResult.innerText = "写真を解析しています...";
    calorieSources.innerHTML = "";
    try {
      const res = await callGas("estimateMealCalories", {
        imageBlobs, memo: memo.value || "", mealTiming: mealTiming.value || ""
      });
      if (res.status !== "success") throw new Error();
      latestCalorie = res.result || {};
      const r = latestCalorie;
      calorieResult.className = "calorie-box ok";
      calorieResult.innerText =
        `推定カロリー: ${+r.estimatedCalories || 0} kcal\n` +
        `P: ${+r.protein || 0}g  /  F: ${+r.fat || 0}g  /  C: ${+r.carbohydrate || 0}g\n` +
        `根拠: ${r.basis || "食品DBと写真推定の組み合わせ"}`;
      calorieSources.innerHTML = (r.referenceSources || [])
        .map(u => `<div><a href="${u}" target="_blank" rel="noopener">${u}</a></div>`).join("");
    } catch (_) {
      calorieResult.innerText = "推定に失敗しました。時間をおいて再試行してください。";
    } finally {
      calorieBtn.disabled = false;
      calorieBtn.innerText = "📊 写真からカロリー推定";
    }
  }

  /* ===== 記録送信 ===== */
  async function sendData() {
    if (!memo.value.trim() && recordType === "食事") return alert("食事内容をメモに入力してください");
    submitBtn.disabled = true;
    submitBtn.innerText = "送信中...";
    try {
      const p = await liff.getProfile();
      const payload = {
        lineId: p.userId, userName: p.displayName,
        recordType, category: category.value,
        mealTiming:      mealTiming.value      || "",
        memo:            memo.value.trim()     || "未入力",
        recordDate:      date.value,
        exerciseType:    exerciseType.value    || "",
        exerciseMinutes: +(exerciseMinutes.value || 0),
        weight:          +(weight.value          || 0),
        bodyFat:         +(bodyFat.value          || 0),
        bowelMovement:   bowelMovement.value    || "",
        imageBlobs
      };
      if (latestCalorie) {
        payload.estimatedCalories = +(latestCalorie.estimatedCalories || 0);
        payload.protein            = +(latestCalorie.protein           || 0);
        payload.fat                = +(latestCalorie.fat               || 0);
        payload.carbohydrate       = +(latestCalorie.carbohydrate      || 0);
        payload.calorieBasis       = latestCalorie.basis || "";
      }
      const res = await callGas("uploadRecord", payload);
      if (res.status !== "success") throw new Error();
      alert("記録を保存しました！");
      location.reload();
    } catch (_) {
      alert("送信に失敗しました。もう一度お試しください。");
      submitBtn.disabled = false;
      submitBtn.innerText = "記録を保存する";
    }
  }

  /* ===== 共通フィルター ===== */
  function filterData(src, user, cat, year, month) {
    return src.filter(d => {
      const dt = new Date(d.recordDate || d.date);
      return (!user  || d.lineId === user) &&
             (!cat   || d.category === cat || d.recordType === cat) &&
             (!year  || dt.getFullYear() == year) &&
             (!month || dt.getMonth() + 1 == month);
    });
  }

  /* ===== 履歴タブ ===== */
  function applyFilters() {
    const data = filterData(allData, filterUser.value, filterCategory.value, filterYear.value, filterMonth.value);
    renderMonthlyStats(data);
    renderList(data);
  }

  function renderMonthlyStats(data) {
    if (!data.length) { monthlyStats.classList.add("hidden"); return; }
    monthlyStats.classList.remove("hidden");

    msWorkout.innerText = data.filter(d => d.recordType === "運動").length + "回";

    const wRows = data.filter(d => +d.weight > 0)
      .sort((a, b) => String(a.recordDate).localeCompare(String(b.recordDate)));
    if (wRows.length >= 2) {
      const diff = +wRows[wRows.length - 1].weight - +wRows[0].weight;
      msWeight.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(1) + "kg";
      msWeight.style.color = diff > 0 ? "var(--red)" : "var(--green)";
    } else {
      msWeight.innerText = "-";
      msWeight.style.color = "var(--green)";
    }

    const uniqueDates = new Set(data.map(d => d.recordDate));
    const bowelYes = data.filter(d => d.bowelMovement === "あり").length;
    msBowel.innerText = uniqueDates.size
      ? Math.round(bowelYes / uniqueDates.size * 100) + "%"
      : "-";
  }

  function renderList(data) {
    listSummary.classList.remove("hidden");
    if (!data.length) {
      listSummary.innerText = "対象件数: 0件";
      listWrap.innerHTML = `<div class="list-card"><div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">該当する記録がありません</div>
      </div></div>`;
      return;
    }
    let exTotal = 0;
    const card = document.createElement("div");
    card.className = "list-card";
    data.forEach(item => {
      const mins = +(item.exerciseMinutes || 0);
      exTotal += mins;
      const kcal    = +(item.estimatedCalories || 0);
      const metric  = kcal > 0       ? `${kcal} kcal`
                    : mins > 0       ? `${mins} 分`
                    : item.weight > 0 ? `${item.weight} kg`
                    : "記録済み";
      const tc      = item.recordType === "食事" ? "meal"
                    : item.recordType === "運動" ? "workout" : "health";
      const photos  = (Array.isArray(item.imageUrls) ? item.imageUrls : [])
        .map((u, i) => `<a class="photo-a" href="${u}" target="_blank" rel="noopener">📷 写真${i + 1}</a>`).join("");
      const row = document.createElement("div");
      row.className = "list-row";
      row.innerHTML = `
        <div class="list-main">
          <div class="list-memo">${item.memo || "メモなし"}</div>
          <div class="list-meta">${item.recordDate || ""} · ${item.category || item.recordType || "-"} · ${item.userName || "不明"}</div>
          ${photos ? `<div class="list-photos">${photos}</div>` : ""}
        </div>
        <div class="list-right">
          <span class="rec-badge ${tc}">${item.recordType || "-"}</span>
          <div class="list-metric">${metric}</div>
        </div>`;
      card.appendChild(row);
    });
    listWrap.innerHTML = "";
    listWrap.appendChild(card);
    listSummary.innerText = `対象件数: ${data.length}件　運動時間合計: ${exTotal}分`;
  }

  /* ===== サマリータブ ===== */
  function applySummary() {
    const base     = filterData(allData, summaryUser.value, "", summaryYear.value, summaryMonth.value);
    const filtered = base.filter(d =>
      !summaryCategory.value || d.category === summaryCategory.value || d.recordType === summaryCategory.value
    );
    renderKpi(base);
    renderWeightChart(base);
    renderBarChart(base);
    renderDoughnut(filtered);
  }

  function renderKpi(data) {
    if (!data.length) { kpiGrid.classList.add("hidden"); return; }
    kpiGrid.classList.remove("hidden");

    const wRows = data.filter(d => +d.weight > 0)
      .sort((a, b) => String(a.recordDate).localeCompare(String(b.recordDate)));
    if (wRows.length >= 2) {
      const diff = +wRows[wRows.length - 1].weight - +wRows[0].weight;
      kpiWeight.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(1);
      kpiWeight.style.color = diff > 0 ? "var(--red)" : "var(--green)";
    } else {
      kpiWeight.innerText = "-";
    }
    kpiWorkout.innerText = data.filter(d => d.recordType === "運動")
      .reduce((s, d) => s + (+d.exerciseMinutes || 0), 0);
    kpiBowel.innerText = data.filter(d => d.bowelMovement === "あり").length;
    kpiMeal.innerText  = data.filter(d => d.recordType === "食事").length;
  }

  function renderWeightChart(data) {
    const rows = data.filter(d => +d.weight > 0)
      .sort((a, b) => String(a.recordDate).localeCompare(String(b.recordDate)));
    const ctx = document.getElementById("weightChart").getContext("2d");
    if (chartW) chartW.destroy();
    if (!rows.length) return;
    chartW = new Chart(ctx, {
      type: "line",
      data: {
        labels: rows.map(d => d.recordDate),
        datasets: [{
          label: "体重 (kg)",
          data: rows.map(d => +d.weight),
          borderColor: "#06C755",
          backgroundColor: "rgba(6,199,85,0.08)",
          pointRadius: 5, tension: 0.3, fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { maxTicksLimit: 6, font: { size: 10 } } },
          y: { ticks: { font: { size: 10 } } }
        }
      }
    });
  }

  function renderBarChart(data) {
    const wMin  = data.filter(d => d.recordType === "運動")
      .reduce((s, d) => s + (+d.exerciseMinutes || 0), 0);
    const meals = data.filter(d => d.recordType === "食事").length;
    const ctx = document.getElementById("barChart").getContext("2d");
    if (chartB) chartB.destroy();
    chartB = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["運動時間 (分)", "食事記録数"],
        datasets: [{
          data: [wMin, meals],
          backgroundColor: ["#007bff", "#e74c3c"],
          borderRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { font: { size: 10 } } } }
      }
    });
  }

  function renderDoughnut(data) {
    const stats = {};
    data.forEach(d => {
      const k = d.recordType || "未設定";
      stats[k] = (stats[k] || 0) + 1;
    });
    const ctx = document.getElementById("doughnutChart").getContext("2d");
    if (chartD) chartD.destroy();
    if (!Object.keys(stats).length) return;
    chartD = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: Object.keys(stats),
        datasets: [{
          data: Object.values(stats),
          backgroundColor: ["#06C755", "#007bff", "#f39c12", "#e74c3c"]
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: "bottom", labels: { font: { size: 12 }, padding: 14 } }
        }
      }
    });
  }

  /* ===== AI助言タブ ===== */
  async function runAI() {
    aiBtn.disabled = true;
    aiBtn.innerText = "分析中...";
    aiResult.className = "ai-result";
    aiResult.innerText = "AIがデータを分析しています...";
    try {
      const res = await callGas("analyzeHealth", {
        lineId:     adviceUser.value || currentUserId,
        periodDays: +(advicePeriod.value || 7)
      });
      if (res.status !== "success") throw new Error();
      aiResult.className = "ai-result ok";
      aiResult.innerText = (res.result && res.result.adviceText) || "分析結果が空でした。";
    } catch (_) {
      aiResult.innerText = "分析に失敗しました。時間をおいて再試行してください。";
    } finally {
      aiBtn.disabled = false;
      aiBtn.innerText = "🤖 AI分析を実行する";
    }
  }
</script>
</body>
</html>
